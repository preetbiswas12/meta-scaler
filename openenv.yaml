version: "1.0"
name: "email_triage"
description: "Multi-step email triage and classification environment"
environment:
  name: "EmailTriageEnv"
  entry_point: "src.environment:EmailTriageEnv"
  state_schema:
    type: "object"
    properties:
      task_id:
        type: "string"
        description: "Unique task identifier"
      current_email:
        type: "object"
        description: "Current email to triage"
      actions_taken:
        type: "array"
        description: "List of actions taken so far"
      required_actions:
        type: "array"
        description: "Ground truth actions required"
      difficulty:
        type: "string"
        enum: ["easy", "medium", "hard"]
        description: "Task difficulty level"
      step:
        type: "integer"
        description: "Current step in the episode"
      max_steps:
        type: "integer"
        description: "Maximum steps allowed"
      score:
        type: "number"
        description: "Current episode score (0.0-1.0)"
      done:
        type: "boolean"
        description: "Episode completion flag"

tasks:
  - id: "easy"
    name: "Basic Email Triage"
    description: "Triage simple emails with straightforward actions"
    difficulty: "easy"
    grader: "easy_grader"
    grader_type: "deterministic"
    max_steps: 3
    
  - id: "medium"
    name: "Complex Email Handling"
    description: "Handle complex emails requiring multiple actions and judgment"
    difficulty: "medium"
    grader: "medium_grader"
    grader_type: "deterministic"
    max_steps: 4
    
  - id: "hard"
    name: "Critical Issue Management"
    description: "Handle critical emails requiring escalation and careful coordination"
    difficulty: "hard"
    grader: "hard_grader"
    grader_type: "deterministic"
    max_steps: 5

graders:
  - id: "easy_grader"
    name: "Easy Task Grader"
    type: "deterministic"
    description: "Grader for basic email triage tasks"
    task_id: "easy"
    metrics:
      - name: "action_correctness"
        type: "boolean"
      - name: "step_reward"
        type: "float"
        range: (0.0, 1.0)
    
  - id: "medium_grader"
    name: "Medium Task Grader"
    type: "deterministic"
    description: "Grader for complex email handling tasks"
    task_id: "medium"
    metrics:
      - name: "action_correctness"
        type: "boolean"
      - name: "sequence_quality"
        type: "float"
        range: (0.0, 1.0)
      - name: "step_reward"
        type: "float"
        range: (0.0, 1.0)
    
  - id: "hard_grader"
    name: "Hard Task Grader"
    type: "deterministic"
    description: "Grader for critical issue management tasks"
    task_id: "hard"
    metrics:
      - name: "action_correctness"
        type: "boolean"
      - name: "sequence_quality"
        type: "float"
        range: (0.0, 1.0)
      - name: "reasoning_quality"
        type: "float"
        range: (0.0, 1.0)
      - name: "step_reward"
        type: "float"
        range: (0.0, 1.0)

metrics:
  - name: "score"
    type: "float"
    range: (0.0, 1.0)
  - name: "reward"
    type: "float"
    range: (0.0, 1.0)
  - name: "step_count"
    type: "integer"
  - name: "actions_quality"
    type: "float"
    range: (0.0, 1.0)

deployment:
  resources:
    cpu: "2"
    memory: "4Gi"
    timeout: 300
  container:
    image: "python:3.11-slim"
    port: 8000
