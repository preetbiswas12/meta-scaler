spec_version: 1
name: "email_triage"
description: "Multi-step email triage and classification environment"
environment:
  name: "EmailTriageEnv"
  entry_point: "src.environment:EmailTriageEnv"
  state_schema:
    type: "object"
    properties:
      task_id:
        type: "string"
        description: "Unique task identifier"
      current_email:
        type: "object"
        description: "Current email to triage"
      actions_taken:
        type: "array"
        description: "List of actions taken so far"
      required_actions:
        type: "array"
        description: "Ground truth actions required"
      difficulty:
        type: "string"
        enum: ["easy", "medium", "hard"]
        description: "Task difficulty level"
      step:
        type: "integer"
        description: "Current step in the episode"
      max_steps:
        type: "integer"
        description: "Maximum steps allowed"
      score:
        type: "number"
        description: "Current episode score (0.0-1.0)"
      done:
        type: "boolean"
        description: "Episode completion flag"

tasks:
  - id: "basic_email_classification"
    name: "Basic Email Classification"
    description: "Classify simple emails (sales inquiries, newsletters, transactional). Focus on categorization accuracy."
    difficulty: "easy"
    grader: "src.graders_normalized:grade_basic_classification"
    max_steps: 3
    
  - id: "phishing_threat_detection"
    name: "Phishing Threat Detection"
    description: "Detect phishing emails, urgent technical threats, and suspicious patterns. Multi-action handling required."
    difficulty: "medium"
    grader: "src.graders_normalized:grade_phishing_detection"
    max_steps: 4
    
  - id: "critical_escalation_handling"
    name: "Critical Escalation Handling"
    description: "Handle critical issues requiring escalation, investigation, and coordination. Strategic decision-making required."
    difficulty: "hard"
    grader: "src.graders_normalized:grade_escalation_handling"
    max_steps: 5

deployment:
  resources:
    cpu: "2"
    memory: "4Gi"
    timeout: 300
  container:
    image: "python:3.11-slim"
    port: 8000
