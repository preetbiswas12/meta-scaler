version: "1.0"
name: "code_test_generation"
description: "Generate comprehensive test cases for Python code snippets"
environment:
  name: "CodeTestGeneration"
  entry_point: "src.environment:CodeTestGenerationEnv"
  state_schema:
    type: "object"
    properties:
      task_id:
        type: "string"
        description: "Unique task identifier"
      code_snippet:
        type: "string"
        description: "Python code to generate tests for"
      function_name:
        type: "string"
        description: "Name of the function to test"
      difficulty:
        type: "string"
        enum: ["easy", "medium", "hard"]
        description: "Task difficulty level"
      step:
        type: "integer"
        description: "Current step in the episode"
      max_steps:
        type: "integer"
        description: "Maximum steps allowed"
      generated_tests:
        type: "string"
        description: "Tests generated by model"
      score:
        type: "number"
        description: "Current episode score"
      done:
        type: "boolean"
        description: "Episode completion flag"

tasks:
  - id: "easy"
    name: "Simple Function Testing"
    description: "Generate tests for a simple utility function"
    difficulty: "easy"
    grader_type: "deterministic"
    max_steps: 5
    
  - id: "medium"
    name: "Edge Case Coverage"
    description: "Generate tests covering edge cases and error conditions"
    difficulty: "medium"
    grader_type: "deterministic"
    max_steps: 8
    
  - id: "hard"
    name: "Complex System Testing"
    description: "Generate comprehensive tests for complex state management"
    difficulty: "hard"
    grader_type: "deterministic"
    max_steps: 10

graders:
  - id: "test_quality"
    type: "deterministic"
    metrics:
      - "test_count"
      - "syntax_correctness"
      - "edge_case_coverage"
      - "assertion_quality"

metrics:
  - name: "score"
    type: "float"
    range: [0.0, 1.0]
  - name: "reward"
    type: "float"
    range: [-1.0, 1.0]
  - name: "test_count"
    type: "integer"
  - name: "coverage"
    type: "float"
    range: [0.0, 100.0]

deployment:
  resources:
    cpu: "2"
    memory: "8Gi"
    timeout: 1200
  container:
    image: "python:3.11-slim"
    port: 8000
