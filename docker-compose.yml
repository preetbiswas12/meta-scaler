version: '3.8'

services:
  openenv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openenv-test-generation
    environment:
      # IMPORTANT: Validator injects API_BASE_URL and API_KEY at runtime
      - API_KEY=${API_KEY:-}
      - API_BASE_URL=${API_BASE_URL:-https://api.openai.com/v1}
      - MODEL_NAME=${MODEL_NAME:-gpt-3.5-turbo}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-${API_KEY:-}}
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    # IMPORTANT: Remove --use-api flag - API_BASE_URL and API_KEY are injected by validator
    # The OpenAI client will automatically use injected credentials
    command: python inference.py --task all --episodes 1 --steps 3
    restart: unless-stopped
